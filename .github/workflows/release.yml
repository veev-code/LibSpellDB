name: Package and Release

on:
  push:
    branches:
      - main
    tags:
      - '*'

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lua syntax check
        run: |
          sudo apt-get install -y lua5.1 > /dev/null 2>&1
          echo "Checking Lua syntax..."
          errors=0
          while IFS= read -r file; do
            if ! luac5.1 -p "$file" 2>/dev/null; then
              echo "SYNTAX ERROR: $file"
              luac5.1 -p "$file"
              errors=$((errors + 1))
            fi
          done < <(find . -name '*.lua' -not -path './Libs/*')
          if [ $errors -gt 0 ]; then
            echo "Found $errors file(s) with syntax errors"
            exit 1
          fi
          echo "All Lua files pass syntax check"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Validate spell data
        run: python Tools/validate_spells.py

  release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and Release
        uses: BigWigsMods/packager@v2
        with:
          args: -g 2.5.5
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

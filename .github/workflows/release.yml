name: Package and Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*.*.*'
  pull_request:
    branches:
      - master

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Validate release tag
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if [[ ! "$GITHUB_REF_NAME" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Release tag must have the form vX.Y.Z."
            exit 1
          fi

      - name: Lua syntax check
        run: |
          sudo apt-get install -y lua5.1 > /dev/null 2>&1
          echo "Checking Lua syntax..."
          errors=0
          while IFS= read -r file; do
            if ! luac5.1 -p "$file" 2>/dev/null; then
              echo "SYNTAX ERROR: $file"
              luac5.1 -p "$file"
              errors=$((errors + 1))
            fi
          done < <(find . -name '*.lua' -not -path './Libs/*')
          if [ $errors -gt 0 ]; then
            echo "Found $errors file(s) with syntax errors"
            exit 1
          fi
          echo "All Lua files pass syntax check"

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.x'

      - name: Validate spell data
        run: python Tools/validate_spells.py

      - name: Build package without uploading
        if: github.ref_type != 'tag'
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28 # v2
        with:
          args: -d

      - name: Verify package contract
        if: github.ref_type != 'tag'
        run: python3 Tools/check_package_contents.py .release --source-root .

  release:
    needs: validate
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest

    concurrency:
      group: libspelldb-release
      cancel-in-progress: false

    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0

      - name: Package and Release
        uses: BigWigsMods/packager@6d50adb6e8517eefef63f4afb16a6518166a6b28 # v2
        # Game versions (Classic Era 11508 + TBC 20506) are auto-detected from the TOC ## Interface line
        env:
          CF_API_KEY: ${{ secrets.CF_API_KEY }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify release package contract
        run: python3 Tools/check_package_contents.py .release --source-root .

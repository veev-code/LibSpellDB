name: Live spell-data audit

on:
  workflow_dispatch:
  schedule:
    - cron: "17 9 * * 1"

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Check out repository
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"

      - name: Run offline audit regressions
        run: python -m unittest Tools/test_wowhead_audit.py

      - name: Verify every spell with Wowhead and Wago
        run: >-
          python Tools/wowhead_audit.py
          --audit
          --strict
          --no-cache
          --delay 0.20
          --json-report live-spell-audit.json
